<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PlanAR – Inicio</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Inter:wght@400;500&display=swap');
    :root { --bg:#0d0d14; --accent:#c8f04a; --text:#f0f0f0; --muted:#888; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:2rem; }
    h1 { font-family:'Syne',sans-serif; font-size:3rem; font-weight:800; margin-bottom:1rem; }
    h1 em { font-style:normal; color:var(--accent); }
    p { color:var(--muted); margin-bottom:2rem; max-width:480px; line-height:1.6; }
    a { display:inline-block; background:var(--accent); color:#0d0d14; font-weight:500; padding:0.7rem 1.6rem; border-radius:999px; text-decoration:none; transition:opacity .2s; }
    a:hover { opacity:.85; }
  </style>
</head>
<body>
  <h1>Plan<em>AR</em></h1>
  <p>Descubrí eventos, recitales, ferias y actividades culturales en un solo lugar.</p>

</body>
</html>
